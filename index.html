<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chemical Barcode Remover</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         padding: 20px; max-width: 640px; margin: 0 auto; color: #202124; }
  h1 { font-size: 1.4em; margin-bottom: 4px; }
  .sub { color: #5f6368; font-size: 0.9em; margin-bottom: 18px; }
  button { font-size: 1.05em; padding: 12px 18px; border-radius: 8px;
           border: none; cursor: pointer; margin: 4px 4px 4px 0; font-weight: 500; }
  .primary   { background: #1a73e8; color: white; }
  .danger    { background: #d93025; color: white; }
  .secondary { background: #e8eaed; color: #202124; }
  .listening { background: #d93025; color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.55; } }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .heard { background: #f1f3f4; padding: 12px; border-radius: 8px;
           margin: 14px 0; font-family: monospace; }
  .card  { border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin: 14px 0; }
  .row   { margin: 6px 0; }
  .label { color: #5f6368; font-size: 0.85em; display: inline-block; min-width: 90px; }
  .error   { color: #b3261e; padding: 12px; background: #fce8e6; border-radius: 8px; margin: 14px 0; }
  .success { color: #137333; padding: 12px; background: #e6f4ea; border-radius: 8px; margin: 14px 0; }
  .status  { font-size: 0.8em; color: #5f6368; margin-top: 8px; }
</style>
</head>
<body>

<h1>Chemical Barcode Remover</h1>
<div class="sub">Tap the mic, speak the barcode, confirm, delete.</div>

<button id="micBtn"    class="primary">🎤 Tap and speak</button>
<button id="manualBtn" class="secondary">Type instead</button>
<div id="status" class="status">Warming up…</div>

<div id="heard"  class="heard" style="display:none;"></div>
<div id="result"></div>

<script>
// =========================================================
// CONFIG — set before uploading.
// =========================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3QgT-8Ba2m6NLAP7VDSzy6VzCd-Ph7j8_AST74y3Pe1lXLq_MaV7ezutlswUDTF9i5A/exec';
const TOKEN           = 'abcdefghijklmnopqrstuvwxysabcdefghijklmnopqrstuvwxyz';
// =========================================================

let currentMatch = null;
const micBtn   = document.getElementById('micBtn');
const heardEl  = document.getElementById('heard');
const resultEl = document.getElementById('result');
const statusEl = document.getElementById('status');

// Warm up the Apps Script on page load.
(async function warmup() {
  const start = performance.now();
  try {
    await fetch(APPS_SCRIPT_URL, { method: 'GET' });
    const ms = Math.round(performance.now() - start);
    statusEl.textContent = 'Ready (warmup: ' + ms + ' ms).';
  } catch {
    statusEl.textContent = 'Ready.';
  }
})();

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SR) {
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (e) => handleHeard(e.results[0][0].transcript);
  recognition.onerror  = (e) => { resetMic(); showError('Mic error: ' + e.error); };
  recognition.onend    = ()  => resetMic();
} else {
  micBtn.disabled = true;
  micBtn.textContent = 'Voice not supported here — use Type instead';
}

micBtn.onclick = () => {
  if (!recognition) return;
  clearUI();
  micBtn.classList.remove('primary');
  micBtn.classList.add('listening');
  micBtn.textContent = '🔴 Listening… speak now';
  try { recognition.start(); } catch (e) {}
};

document.getElementById('manualBtn').onclick = () => {
  const t = prompt('Enter barcode:');
  if (t) { clearUI(); handleHeard(t); }
};

function resetMic() {
  micBtn.classList.remove('listening');
  micBtn.classList.add('primary');
  micBtn.textContent = '🎤 Tap and speak';
}

function clearUI() {
  heardEl.style.display = 'none';
  resultEl.innerHTML = '';
  currentMatch = null;
}

async function callAPI(payload) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(Object.assign({ token: TOKEN }, payload))
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function handleHeard(text) {
  heardEl.textContent = 'Heard: "' + text + '"';
  heardEl.style.display = 'block';
  resultEl.innerHTML = '<p>Searching…</p>';
  const start = performance.now();
  try {
    const result = await callAPI({ action: 'find', barcode: text });
    const ms = Math.round(performance.now() - start);
    if (result.error)    { showError(result.error); return; }
    if (result.notFound) {
      resultEl.innerHTML = '<div class="error"><b>Not found.</b> No row matches that barcode. ' +
        '<span style="color:#5f6368;">(' + ms + ' ms)</span></div>';
      return;
    }
    showMatch(result, ms);
  } catch (err) {
    showError(err.message);
  }
}

function showMatch(match, ms) {
  currentMatch = match;
  resultEl.innerHTML = `
    <div class="card">
      <div class="row"><span class="label">Barcode:</span> <b>${esc(match.barcode)}</b>
           <span style="color:#5f6368;">(matched as ${esc(match.normalized)})</span></div>
      <div class="row"><span class="label">Container:</span> ${esc(match.containerName)}</div>
      <div class="row"><span class="label">CAS:</span> ${esc(match.cas)}</div>
      <div class="row"><span class="label">Size:</span> ${esc(match.size)} ${esc(match.unit)}</div>
      <div class="row"><span class="label">Location:</span> ${esc(match.location)}</div>
      <div class="row"><span class="label">Sheet / Row:</span> ${esc(match.sheetName)} / ${match.rowNumber}</div>
      <div class="row" style="color:#5f6368; font-size:0.85em;">Found in ${ms} ms</div>
      <div style="margin-top:14px;">
        <button class="danger"    onclick="confirmDelete()">Delete this row</button>
        <button class="secondary" onclick="clearUI()">Cancel</button>
      </div>
    </div>
  `;
}

async function confirmDelete() {
  if (!currentMatch) return;
  const m = currentMatch;
  resultEl.innerHTML = '<p>Deleting…</p>';
  try {
    // Delete by barcode — the server will re-find the (possibly shifted) row.
    const result = await callAPI({ action: 'delete', barcode: m.barcode });
    if (result.success) {
      resultEl.innerHTML = '<div class="success"><b>Deleted.</b> ' +
        esc(result.barcode) + ' removed from "' + esc(result.sheetName) + '".</div>';
    } else {
      showError(result.error || 'Delete failed');
    }
    currentMatch = null;
  } catch (err) {
    showError(err.message);
  }
}

function showError(msg) {
  resultEl.innerHTML = '<div class="error">' + esc(msg) + '</div>';
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
