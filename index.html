<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chemical Barcode Remover</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         padding: 16px; max-width: 720px; margin: 0 auto; color: #202124;
         background: #fafafa; }
  h1 { font-size: 1.3em; margin: 0 0 4px 0; }
  .sub { color: #5f6368; font-size: 0.85em; margin-bottom: 14px; }

  /* Input bar */
  .input-bar { display: flex; gap: 8px; align-items: center;
               position: sticky; top: 0; background: #fafafa; padding: 8px 0; z-index: 10; }
  #barcodeInput { flex: 1; font-size: 1.3em; padding: 14px 16px; border-radius: 8px;
                  border: 2px solid #1a73e8; outline: none; font-family: monospace; }
  #barcodeInput:focus { border-color: #1557b0; box-shadow: 0 0 0 3px rgba(26,115,232,0.2); }
  #searchBtn { font-size: 1.05em; padding: 14px 22px; border-radius: 8px;
               border: none; background: #1a73e8; color: white; cursor: pointer; font-weight: 500; }

  .stats { display: flex; gap: 16px; margin: 10px 0; font-size: 0.9em; color: #5f6368; }
  .stats b { color: #202124; }

  /* Result card */
  .card { background: white; border: 1px solid #dadce0; border-radius: 10px;
          padding: 18px; margin: 14px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .card .barcode-big { font-size: 1.6em; font-weight: 600; margin-bottom: 4px; font-family: monospace; }
  .row { margin: 5px 0; }
  .label { color: #5f6368; font-size: 0.85em; display: inline-block; min-width: 90px; }
  .actions { margin-top: 16px; }
  button { font-size: 1em; padding: 10px 18px; border-radius: 8px; border: none;
           cursor: pointer; margin-right: 6px; font-weight: 500; }
  .danger    { background: #d93025; color: white; }
  .secondary { background: #e8eaed; color: #202124; }
  .hint { font-size: 0.8em; color: #5f6368; margin-top: 8px; }

  /* Not-found overlay (modal) */
  .not-found-overlay { position: fixed; inset: 0; background: rgba(217,48,37,0.92);
                       display: flex; align-items: center; justify-content: center;
                       z-index: 1000; padding: 20px; }
  .not-found-box { background: white; border-radius: 14px; padding: 28px 24px;
                   max-width: 480px; width: 100%; text-align: center;
                   box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
  .not-found-box h2 { margin: 0 0 8px 0; font-size: 1.6em; color: #b3261e; }
  .not-found-box .barcode { font-family: monospace; font-size: 1.4em; margin: 12px 0;
                            background: #fce8e6; padding: 8px 12px; border-radius: 6px;
                            display: inline-block; }
  .not-found-box .ack { background: #1a73e8; color: white; padding: 12px 24px;
                        margin-top: 16px; font-size: 1.05em; }

  /* Background status (pending/errors/toasts) */
  .status-area { margin-top: 16px; }
  .pending-item, .error-item, .toast-item {
      padding: 8px 12px; margin: 6px 0; border-radius: 6px; font-size: 0.9em;
      display: flex; align-items: center; gap: 8px; }
  .pending-item { background: #e8f0fe; color: #1a4d8f; }
  .error-item   { background: #fce8e6; color: #b3261e; }
  .toast-item   { background: #e6f4ea; color: #137333;
                  animation: fadeOut 2.5s forwards; }
  .error-item button { margin-left: auto; background: transparent; color: #b3261e;
                       padding: 2px 8px; font-size: 1.2em; font-weight: bold; }
  @keyframes fadeOut {
    0%, 70% { opacity: 1; transform: translateY(0); }
    100%    { opacity: 0; transform: translateY(-6px); height: 0; padding-top: 0; padding-bottom: 0; margin: 0; }
  }
  .spinner { display: inline-block; width: 12px; height: 12px;
             border: 2px solid #1a4d8f; border-top-color: transparent; border-radius: 50%;
             animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>Chemical Barcode Remover</h1>
<div class="sub">Type a barcode, press Enter. Review, press Enter again to delete. Repeat.</div>

<div class="input-bar">
  <input id="barcodeInput" type="text" placeholder="Barcode (e.g. Ag030)" autofocus autocomplete="off" spellcheck="false" />
  <button id="searchBtn">Search</button>
</div>

<div class="stats">
  <div>Deleted this session: <b id="deletedCount">0</b></div>
  <div>In progress: <b id="pendingCount">0</b></div>
  <div id="warmupStatus">Warming up…</div>
</div>

<div id="result"></div>
<div id="statusArea" class="status-area"></div>

<!-- Not-found modal -->
<div id="notFoundOverlay" class="not-found-overlay" style="display:none;">
  <div class="not-found-box">
    <h2>⚠️ Not Found</h2>
    <div>No row matches:</div>
    <div class="barcode" id="notFoundBarcode"></div>
    <div style="color:#5f6368; font-size:0.9em;">Check the container; it may not be in the inventory.</div>
    <button id="ackNotFound" class="ack">OK (Enter)</button>
  </div>
</div>

<script>
// =========================================================
// CONFIG
// =========================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3QgT-8Ba2m6NLAP7VDSzy6VzCd-Ph7j8_AST74y3Pe1lXLq_MaV7ezutlswUDTF9i5A/exec';
const TOKEN           = 'abcdefghijklmnopqrstuvwxysabcdefghijklmnopqrstuvwxyz';
// =========================================================

const inputEl       = document.getElementById('barcodeInput');
const searchBtn     = document.getElementById('searchBtn');
const resultEl      = document.getElementById('result');
const statusAreaEl  = document.getElementById('statusArea');
const deletedCountEl= document.getElementById('deletedCount');
const pendingCountEl= document.getElementById('pendingCount');
const warmupEl      = document.getElementById('warmupStatus');
const notFoundEl    = document.getElementById('notFoundOverlay');
const notFoundCode  = document.getElementById('notFoundBarcode');
const ackBtn        = document.getElementById('ackNotFound');

let state = 'idle';      // 'idle' | 'searching' | 'result' | 'notfound'
let currentMatch = null;
let deletedCount = 0;
let pendingId = 0;
const pending = new Map();  // id -> {barcode, element}

// --- Warmup ---
(async function warmup() {
  const start = performance.now();
  try {
    await fetch(APPS_SCRIPT_URL, { method: 'GET' });
    warmupEl.textContent = 'Ready (' + Math.round(performance.now() - start) + ' ms)';
  } catch { warmupEl.textContent = 'Ready'; }
})();

// --- API helper ---
async function callAPI(payload) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(Object.assign({ token: TOKEN }, payload))
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// --- Search ---
async function doSearch(text) {
  if (!text.trim()) return;
  state = 'searching';
  resultEl.innerHTML = '<div class="card"><i>Searching for "' + esc(text) + '"…</i></div>';
  try {
    const result = await callAPI({ action: 'find', barcode: text });
    if (result.error) { showError('Search failed: ' + result.error); resetToInput(); return; }
    if (result.notFound) {
      showNotFound(text);
    } else {
      showMatch(result);
    }
  } catch (err) {
    showError('Search error: ' + err.message);
    resetToInput();
  }
}

function showMatch(match) {
  state = 'result';
  currentMatch = match;
  resultEl.innerHTML = `
    <div class="card">
      <div class="barcode-big">${esc(match.barcode)}</div>
      <div class="row"><span class="label">Container:</span> ${esc(match.containerName)}</div>
      <div class="row"><span class="label">CAS:</span> ${esc(match.cas)}</div>
      <div class="row"><span class="label">Size:</span> ${esc(match.size)} ${esc(match.unit)}</div>
      <div class="row"><span class="label">Location:</span> ${esc(match.location)}</div>
      <div class="row"><span class="label">Sheet:</span> ${esc(match.sheetName)}</div>
      <div class="actions">
        <button class="danger" id="deleteBtn">Delete (Enter)</button>
        <button class="secondary" id="cancelBtn">Cancel (Esc)</button>
      </div>
      <div class="hint">Press Enter to delete and search next. Esc to cancel.</div>
    </div>`;
  document.getElementById('deleteBtn').onclick = doDelete;
  document.getElementById('cancelBtn').onclick = resetToInput;
}

function showNotFound(barcode) {
  state = 'notfound';
  notFoundCode.textContent = barcode;
  notFoundEl.style.display = 'flex';
  ackBtn.focus();
}

// --- Delete (fire and forget) ---
function doDelete() {
  if (!currentMatch) return;
  const m = currentMatch;
  const id = ++pendingId;

  // Add to pending UI
  const el = document.createElement('div');
  el.className = 'pending-item';
  el.innerHTML = '<span class="spinner"></span> Deleting <b>' + esc(m.barcode) + '</b> from "' + esc(m.sheetName) + '"…';
  statusAreaEl.prepend(el);
  pending.set(id, { barcode: m.barcode, element: el });
  updatePendingCount();

  // Clear result + refocus immediately for next search
  resetToInput();

  // Run delete in background
  callAPI({ action: 'delete', barcode: m.barcode })
    .then(result => {
      pending.delete(id);
      el.remove();
      updatePendingCount();
      if (result.success) {
        deletedCount++;
        deletedCountEl.textContent = deletedCount;
        showToast('✓ Deleted ' + result.barcode);
      } else {
        showError('Delete failed for ' + m.barcode + ': ' + (result.error || 'unknown'));
      }
    })
    .catch(err => {
      pending.delete(id);
      el.remove();
      updatePendingCount();
      showError('Delete failed for ' + m.barcode + ': ' + err.message);
    });
}

function updatePendingCount() {
  pendingCountEl.textContent = pending.size;
}

function showToast(text) {
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.textContent = text;
  statusAreaEl.prepend(el);
  setTimeout(() => el.remove(), 2600);
}

function showError(text) {
  const el = document.createElement('div');
  el.className = 'error-item';
  el.innerHTML = '<span>⚠️ ' + esc(text) + '</span><button title="Dismiss">×</button>';
  el.querySelector('button').onclick = () => el.remove();
  statusAreaEl.prepend(el);
}

function resetToInput() {
  state = 'idle';
  currentMatch = null;
  resultEl.innerHTML = '';
  inputEl.value = '';
  inputEl.focus();
}

function dismissNotFound() {
  notFoundEl.style.display = 'none';
  resetToInput();
}

// --- Keyboard handling ---
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    doSearch(inputEl.value);
  }
});

searchBtn.onclick = () => doSearch(inputEl.value);

// Global Enter handler: routes to delete or ack based on state
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (state === 'result') {
      e.preventDefault();
      doDelete();
    } else if (state === 'notfound') {
      e.preventDefault();
      dismissNotFound();
    }
  } else if (e.key === 'Escape') {
    if (state === 'result')   { e.preventDefault(); resetToInput(); }
    if (state === 'notfound') { e.preventDefault(); dismissNotFound(); }
  }
});

ackBtn.onclick = dismissNotFound;

// Keep focus on input whenever we're idle and user clicks elsewhere accidentally
document.addEventListener('click', (e) => {
  if (state === 'idle' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
    inputEl.focus();
  }
});

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
